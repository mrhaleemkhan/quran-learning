<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" aria-labelledby="logoTitle">
  <title id="logoTitle">Ummah Essa — Open Quran on rehal</title>
  <defs>
    <linearGradient id="wood" x1="20" y1="20" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b45309"/>
      <stop offset="0.5" stop-color="#78350f"/>
      <stop offset="1" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="woodHi" x1="64" y1="50" x2="64" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d97706"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="paper" x1="64" y1="32" x2="64" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="20" y1="64" x2="108" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#92400e"/>
      <stop offset="1" stop-color="#451a03"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#312e81" flood-opacity="0.2"/>
    </filter>
  </defs>

  <ellipse cx="64" cy="114" rx="38" ry="6" fill="#312e81" opacity="0.1"/>

  <g filter="url(#sh)">
    <!-- Rehal (X-stand) -->
    <path fill="url(#wood)" d="M18 112 L46 54 L52 58 L26 116 Z"/>
    <path fill="url(#wood)" d="M110 112 L82 54 L76 58 L102 116 Z"/>
    <path fill="url(#woodHi)" d="M14 116 L44 50 L50 54 L22 120 Z"/>
    <path fill="url(#woodHi)" d="M114 116 L84 50 L78 54 L106 120 Z"/>
    <path fill="#78350f" opacity="0.45" d="M44 50 L84 50 L80 58 L48 58 Z"/>

    <!-- Outer cover -->
    <path fill="url(#coverGrad)" d="M22 52 C22 46 106 46 106 52 L106 74 C106 78 22 78 22 74 Z"/>

    <!-- Open pages -->
    <path fill="url(#paper)" stroke="#cbd5e1" stroke-width="0.75" d="M28 50 C44 38 60 38 64 42 L64 72 C60 76 44 76 28 68 Z"/>
    <path fill="url(#paper)" stroke="#cbd5e1" stroke-width="0.75" d="M100 50 C84 38 68 38 64 42 L64 72 C68 76 84 76 100 68 Z"/>

    <!-- Gutter -->
    <rect x="61.5" y="40" width="5" height="34" rx="1" fill="#e2e8f0"/>

    <!-- Arabic-style lines -->
    <g stroke="#94a3b8" stroke-width="1.15" stroke-linecap="round">
      <path d="M34 48 Q48 44 58 46"/>
      <path d="M32 52 Q48 48 58 50"/>
      <path d="M30 56 Q48 52 58 54"/>
      <path d="M29 60 Q48 56 58 58"/>
      <path d="M28 64 Q48 60 58 62"/>
      <path d="M70 48 Q84 44 94 46"/>
      <path d="M70 52 Q86 48 96 50"/>
      <path d="M70 56 Q86 52 96 54"/>
      <path d="M70 60 Q86 56 96 58"/>
      <path d="M70 64 Q86 60 96 62"/>
    </g>

    <!-- Cover rim -->
    <path fill="none" stroke="#451a03" stroke-width="1.25" d="M22 52 C22 46 106 46 106 52"/>

    <!-- Bookmark -->
    <path fill="#dc2626" d="M78 70 L81 70 L79.5 86 L76.5 86 Z"/>
    <path fill="#b91c1c" opacity="0.5" d="M78 70 L79.5 70 L78.75 80 L77.25 80 Z"/>
  </g>
</svg>
